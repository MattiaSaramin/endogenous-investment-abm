name: Build paper

# Compiles paper/main.tex to a PDF in a full TeX Live container and attaches
# the result to the run as a downloadable artifact.
#
# Why this exists: the local TeX Live installation is incomplete and Windows
# Smart App Control blocks unsigned binaries, so compiling on this machine is
# not currently possible; and Overleaf's free tier enforces a short compile
# timeout. GitHub-hosted runners have neither restriction.

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:      # lets you trigger a build by hand from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Compile with latexmk (pdfLaTeX + Biber)
        id: compile
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex
          # latexmk runs pdflatex/biber/pdflatex as many times as needed, so
          # cross-references and the bibliography always resolve.
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      # Downloading run logs or artifacts needs admin rights on the repository, so a
      # failed build was previously opaque to anyone without them: the only public signal
      # was "exit code 12". Annotations ARE public, so the LaTeX diagnostics are promoted
      # into them here. Also surfaces undefined references and bad boxes on success.
      - name: Surface LaTeX diagnostics as annotations
        if: always()
        working-directory: paper
        run: |
          if [ ! -f main.log ]; then
            echo "::error::main.log not produced - the compile step never started TeX"
            exit 0
          fi

          # Hard errors: '! ...' and file:line:message lines from -file-line-error.
          grep -nE '^(!|.+\.tex:[0-9]+:)' main.log | head -40 | while IFS= read -r line; do
            echo "::error::${line}"
          done

          # Context after the first error is usually what identifies the construct.
          if grep -qE '^!' main.log; then
            echo "----- first error, with context -----"
            grep -A 12 -m 1 -E '^!' main.log
          fi

          # Warnings worth seeing even when the build passes.
          grep -nE 'LaTeX Warning: (Reference|Citation).*undefined' main.log |
            head -20 | while IFS= read -r line; do echo "::warning::${line}"; done
          # NOTE: match the backslash in "Overfull \hbox" with '.', not with an escape.
          # A backslash here passes through YAML and the shell before grep sees it, and
          # the earlier '\\hbox' silently matched nothing - reporting a reassuring zero
          # on a log that had plenty. Verified against a synthetic log before use.
          echo "::notice::Overfull hbox count: $(grep -cE 'Overfull .hbox' main.log || true)"
          echo "::notice::Underfull hbox count: $(grep -cE 'Underfull .hbox' main.log || true)"
          grep -nE 'Overfull .hbox \([0-9]{2,}\.[0-9]+pt' main.log |
            head -10 | while IFS= read -r line; do echo "::warning::severe ${line}"; done

      - name: Upload the PDF (and the log, so failures are diagnosable)
        uses: actions/upload-artifact@v4
        if: always()        # runs even when the compile step failed
        with:
          name: paper-pdf
          path: |
            paper/main.pdf
            paper/main.log
          # 'warn', not 'error': on a failed build main.pdf does not exist and
          # this step must still succeed in order to hand you main.log.
          if-no-files-found: warn
          retention-days: 30
